<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: cream paper card with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#f5ecd9"/>
  <!-- Subtle inner border (paper edge) -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#1f2937" stroke-width="6" stroke-dasharray="0"/>
  <!-- Ledger lines across the page -->
  <line x1="60" y1="140" x2="452" y2="140" stroke="#9ca3af" stroke-width="3"/>
  <line x1="60" y1="200" x2="452" y2="200" stroke="#9ca3af" stroke-width="3"/>
  <line x1="60" y1="260" x2="452" y2="260" stroke="#9ca3af" stroke-width="3"/>
  <line x1="60" y1="320" x2="452" y2="320" stroke="#9ca3af" stroke-width="3"/>
  <line x1="60" y1="380" x2="452" y2="380" stroke="#9ca3af" stroke-width="3"/>
  <!-- Big tax-form serif "T" hugged by a coin ring -->
  <circle cx="256" cy="280" r="130" fill="#0f172a"/>
  <text x="256" y="338" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="200" fill="#f5ecd9">₿</text>
  <!-- Top corner stamp: "25" for tax year -->
  <rect x="350" y="56" width="96" height="48" rx="6" fill="#b91c1c"/>
  <text x="398" y="92" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="36" fill="#f5ecd9">'25</text>
</svg>
