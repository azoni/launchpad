name: Build Launchpad App

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "App description from the user"
        required: true
        type: string
      build_id:
        description: "Firestore build document ID for status tracking"
        required: true
        type: string
      slug:
        description: "App directory name (lowercase, no spaces)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CLIs
        run: |
          npm install -g @anthropic-ai/claude-code netlify-cli firebase-tools

      - name: Update build status to "building"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e "
            const admin = require('firebase-admin');
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            admin.initializeApp({ credential: admin.credential.cert(sa) });
            admin.firestore().collection('launchpad_builds').doc('${{ inputs.build_id }}')
              .update({ status: 'building', startedAt: admin.firestore.FieldValue.serverTimestamp() })
              .then(() => process.exit(0));
          " || echo "Firestore update failed, continuing build..."

      - name: Build app with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          claude --print \
            --allowedTools "Bash Edit Write Read Glob Grep" \
            --dangerously-skip-permissions \
            --max-budget-usd 20 \
            -p "Build a new app in this launchpad monorepo in a directory called '${{ inputs.slug }}'.

          Here is what the user wants: ${{ inputs.prompt }}

          IMPORTANT INSTRUCTIONS:
          1. Read CLAUDE.md at the repo root for all quality standards — follow every item.
          2. The app goes in ./${{ inputs.slug }}/ as its own Next.js project.
          3. After building, deploy to Netlify:
             - Create a Netlify site: netlify sites:create --name ${{ inputs.slug }} --account-slug azoni
             - Deploy: cd ${{ inputs.slug }} && netlify deploy --build --prod
          4. Update the root README.md with the new app in the Apps table.
          5. Commit and push all changes to the main branch.
          6. At the very end, print the live Netlify URL."

      - name: Extract deployed URL
        id: extract_url
        run: |
          # Try to find the Netlify URL from the slug
          echo "url=https://${{ inputs.slug }}.netlify.app" >> $GITHUB_OUTPUT

      - name: Update build status to "complete"
        if: success()
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install firebase-admin
          node -e "
            const admin = require('firebase-admin');
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            admin.initializeApp({ credential: admin.credential.cert(sa) });
            admin.firestore().collection('launchpad_builds').doc('${{ inputs.build_id }}')
              .update({
                status: 'complete',
                netlifyUrl: '${{ steps.extract_url.outputs.url }}',
                completedAt: admin.firestore.FieldValue.serverTimestamp()
              })
              .then(() => process.exit(0));
          "

      - name: Update build status to "failed"
        if: failure()
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install firebase-admin
          node -e "
            const admin = require('firebase-admin');
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            admin.initializeApp({ credential: admin.credential.cert(sa) });
            admin.firestore().collection('launchpad_builds').doc('${{ inputs.build_id }}')
              .update({
                status: 'failed',
                error: 'Build failed — check GitHub Actions logs',
                completedAt: admin.firestore.FieldValue.serverTimestamp()
              })
              .then(() => process.exit(0));
          "
